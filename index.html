<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3ねんせい しゃかい たんけんポータル！</title>
    <style>
        body {
            font-family: 'Hiragino Maru Gothic ProN', 'Meiryo', sans-serif;
            background-color: #f0f8ff; /* やさしい水色 */
            color: #333;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        header {
            background-color: #ff9800; /* 元気なオレンジ */
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        h1 {
            margin: 0;
            font-size: 2.5em;
            letter-spacing: 2px;
        }

        p.subtitle {
            font-size: 1.2em;
            font-weight: bold;
            margin-top: 10px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .unit-card {
            background-color: white;
            width: 280px;
            padding: 20px;
            border-radius: 20px;
            text-decoration: none;
            color: #333;
            border: 4px solid #ddd;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
        }

        /* ホバー時のワクワクする動き */
        .unit-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.15);
        }

        /* 各単元のテーマカラー */
        .card-1 { border-color: #4caf50; } /* 緑：まちの様子 */
        .card-1:hover { background-color: #e8f5e9; }
        
        .card-2 { border-color: #e91e63; } /* ピンク：スーパー */
        .card-2:hover { background-color: #fce4ec; }
        
        .card-3 { border-color: #3f51b5; } /* 青：工場 */
        .card-3:hover { background-color: #e8eaf6; }
        
        .card-4 { border-color: #f44336; } /* 赤：火事 */
        .card-4:hover { background-color: #ffebee; }
        
        .card-5 { border-color: #ffc107; } /* 黄色：事故 */
        .card-5:hover { background-color: #fff8e1; }
        
        .card-6 { border-color: #9c27b0; } /* 紫：移り変わり */
        .card-6:hover { background-color: #f3e5f5; }

        .icon {
            font-size: 3em;
            margin-bottom: 10px;
            display: block;
        }

        .unit-title {
            font-size: 1.4em;
            font-weight: bold;
            margin: 10px 0;
        }

        .unit-desc {
            font-size: 1em;
            color: #666;
            margin: 0;
        }
    </style>
</head>
<body>

    <header>
        <h1>🗺️ 3ねんせい しゃかい たんけんポータル</h1>
        <p class="subtitle">まちの ひみつを さがしにいこう！</p>
    </header>

    <div class="container">
        <a href="unit1.html" class="unit-card card-1">
            <span class="icon">🏘️</span>
            <div class="unit-title">① わたしたちの まち</div>
            <p class="unit-desc">まちには どんなものがあるかな？</p>
        </a>

        <a href="unit2.html" class="unit-card card-2">
            <span class="icon">🛒</span>
            <div class="unit-title">② スーパーの くふう</div>
            <p class="unit-desc">お買いものの ひみつを さぐれ！</p>
        </a>

        <a href="unit3.html" class="unit-card card-3">
            <span class="icon">🏭</span>
            <div class="unit-title">③ 工場の ようす</div>
            <p class="unit-desc">ものづくりの 現場に せまろう！</p>
        </a>

        <a href="unit4.html" class="unit-card card-4">
            <span class="icon">🚒</span>
            <div class="unit-title">④ 火事を ふせぐ</div>
            <p class="unit-desc">みんなの 命を まもる しごと</p>
        </a>

        <a href="unit5.html" class="unit-card card-5">
            <span class="icon">🚓</span>
            <div class="unit-title">⑤ 事故を ふせぐ</div>
            <p class="unit-desc">安全な まちづくり大作戦！</p>
        </a>

        <a href="unit6.html" class="unit-card card-6">
            <span class="icon">⏳</span>
            <div class="unit-title">⑥ まちの うつりかわり</div>
            <p class="unit-desc">むかしと 今を くらべてみよう！</p>
        </a>
    </div>

</body>
</html>
