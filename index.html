<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3ねんせい しゃかいか クエスト</title>
    <style>
        body {
            font-family: 'Hiragino Maru Gothic ProN', 'Meiryo', sans-serif;
            background-color: #e0f7fa;
            color: #333;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #00796b;
            font-size: 2.5em;
            text-shadow: 2px 2px white;
            margin-bottom: 10px;
        }
        p.subtitle {
            font-size: 1.2em;
            font-weight: bold;
            color: #555;
            margin-bottom: 30px;
        }
        .portal-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .quest-card {
            background-color: white;
            border-radius: 20px;
            width: 300px;
            padding: 20px;
            text-decoration: none;
            color: #333;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            border: 4px solid #b2dfdb;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .quest-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            border-color: #009688;
        }
        .card-icon {
            font-size: 4em;
            margin-bottom: 10px;
        }
        .card-title {
            font-size: 1.4em;
            font-weight: bold;
            color: #00796b;
            margin-bottom: 10px;
            width: 100%;
            border-bottom: 2px dashed #b2dfdb;
            padding-bottom: 10px;
        }
        .card-desc {
            font-size: 1em;
            color: #666;
            line-height: 1.4;
        }
        /* 準備中のカード用 */
        .coming-soon {
            filter: grayscale(80%);
            opacity: 0.7;
            cursor: not-allowed;
        }
        .coming-soon:hover {
            transform: none;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            border-color: #b2dfdb;
        }
    </style>
</head>
<body>

    <h1>🌟 3ねんせい しゃかいか クエスト 🌟</h1>
    <p class="subtitle">どのクエストに ちょうせん する？</p>

    <div class="portal-container">
        <a href="unit1.html" class="quest-card">
            <div class="card-icon">🗺️</div>
            <div class="card-title">① わたしたちの まち</div>
            <div class="card-desc">方位や地図記号をおぼえて、まちのひみつをはっけんしよう！</div>
        </a>

        <a href="unit2.html" class="quest-card">
            <div class="card-icon">🏙️</div>
            <div class="card-title">② わたしたちの 市</div>
            <div class="card-desc">市の様子や、土地がどんなふうに使われているかしらべよう！</div>
        </a>

        <a href="unit3.html" class="quest-card">
            <div class="card-icon">🛒</div>
            <div class="card-title">③ スーパーの くふう</div>
            <div class="card-desc">お店の人がしている、たくさんのお客さんに来てもらう工夫とは？</div>
        </a>

        <a href="#" class="quest-card coming-soon">
            <div class="card-icon">🏭</div>
            <div class="card-title">④ 工場・農家の しごと</div>
            <div class="card-desc">（じゅんびちゅう・・・もう少し待ってね！）</div>
        </a>
    </div>

</body>
</html>
