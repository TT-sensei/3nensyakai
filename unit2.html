<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>② わたしたちの市 - たんけんクエスト</title>
    <style>
        body { font-family: 'Hiragino Maru Gothic ProN', 'Meiryo', sans-serif; background-color: #e1f5fe; color: #333; text-align: center; margin: 0; padding: 20px; }
        h1 { color: #0277bd; margin-bottom: 5px;}
        .game-container { background-color: white; max-width: 600px; margin: 0 auto; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 4px solid #03a9f4; }
        
        .status-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-weight: bold; }
        .combo-text { color: #ff5722; font-size: 1.2em; animation: bounce 0.3s ease; }
        @keyframes bounce { 0% {transform: scale(1);} 50% {transform: scale(1.2);} 100% {transform: scale(1);} }

        .progress-container { width: 100%; background-color: #ddd; border-radius: 10px; margin-bottom: 20px; height: 30px; position: relative; }
        .progress-bar { height: 100%; background-color: #29b6f6; border-radius: 10px; width: 0%; transition: width 0.5s ease; }
        .player-icon { position: absolute; top: -10px; left: 0%; font-size: 30px; transition: left 0.5s ease; transform: translateX(-50%); }
        .goal-icon { position: absolute; top: 0; right: 5px; font-size: 20px; }
        
        .question-text { font-size: 1.2em; margin-bottom: 20px; font-weight: bold; min-height: 2em; line-height: 1.4; }
        .general-note { font-size: 0.8em; color: #e91e63; font-weight: bold; display: block; margin-bottom: 5px; }

        .choices { display: flex; flex-direction: column; gap: 10px; }
        .choice-btn { background-color: #f1f8e9; border: 2px solid #4fc3f7; border-radius: 10px; padding: 15px; font-size: 1.1em; cursor: pointer; transition: all 0.2s; }
        .choice-btn:hover { background-color: #b3e5fc; transform: translateY(-2px); }
        .choice-btn:disabled { cursor: not-allowed; opacity: 0.8; }

        #explanation-area { display: none; margin-top: 20px; padding: 15px; background-color: #e3f2fd; border: 2px dashed #0288d1; border-radius: 10px; text-align: left; font-size: 1.1em; color: #01579b; }
        .next-btn { margin-top: 15px; padding: 15px 30px; background-color: #03a9f4; color: white; border: none; border-radius: 30px; font-size: 1.2em; font-weight: bold; cursor: pointer; width: 100%; box-shadow: 0 4px 0 #0277bd; }
        .next-btn:active { transform: translateY(4px); box-shadow: none; }

        #result-area { display: none; }
        .result-title { font-size: 2em; color: #0288d1; margin-bottom: 10px; }
        .reflection-box { background-color: #fff9c4; border: 2px solid #fbc02d; border-radius: 10px; padding: 15px; margin: 20px 0; text-align: left; }
        .back-btn { display: inline-block; margin-top: 20px; padding: 10px 20px; background-color: #0288d1; color: white; text-decoration: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🏙️ わたしたちの市 クエスト</h1>
    <p style="margin-top:0;">高萩市や、市の土地の使われ方についてしらべよう！</p>

    <div class="game-container" id="game-area">
        <div class="status-bar">
            <span id="stage-info" style="color: #666;"></span>
            <span id="combo-display" class="combo-text"></span>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
            <div class="player-icon" id="player-icon">🚌</div>
            <div class="goal-icon">🏢</div>
        </div>

        <div class="question-text" id="question-text">ロード中...</div>
        
        <div class="choices" id="choices-area"></div>

        <div id="explanation-area">
            <div style="font-weight:bold; margin-bottom:5px;">💡 ちょうさメモ（なぜかな？）</div>
            <div id="explanation-text"></div>
            <button class="next-btn" onclick="nextQuestion()">次のちょうさへ ➡️</button>
        </div>
    </div>

    <div class="game-container" id="result-area">
        <div class="result-title">ちょうさ しゅうりょう！</div>
        <p style="font-size: 1.5em;">せいかい：<span id="score"></span> / 10</p>
        <p style="font-size: 1.2em; color: #ff5722; font-weight: bold;">最大連続正解：<span id="max-combo"></span> コンボ！</p>
        <div id="rank-text" style="font-size: 1.3em; font-weight: bold; margin: 10px 0;"></div>
        
        <div class="reflection-box">
            <h3 style="margin-top:0; color: #f57f17;">📝 ノートにふり返りを書こう！</h3>
            <p>高萩市や、土地の使われ方について調べて、<b>「なるほど！」「そういう理由だったのか！」</b>と思ったことは何かな？<br>理由と一緒に、ノートにまとめてみよう。</p>
        </div>

        <button class="choice-btn" style="width:100%; margin-bottom:10px;" onclick="initGame()">もういちど ちょうさする</button>
        <a href="index.html" class="back-btn" style="width:90%;">🏠 ポータルにもどる</a>
    </div>

    <script>
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function playTone(freq, type, duration, vol=0.1) {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = type;
            oscillator.frequency.value = freq;
            gainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + duration);
        }
        function playSound(type) {
            if (type === 'correct') { playTone(523.25, 'sine', 0.1); setTimeout(() => playTone(659.25, 'sine', 0.2), 100); }
            else if (type === 'incorrect') { playTone(250, 'sawtooth', 0.2, 0.2); setTimeout(() => playTone(200, 'sawtooth', 0.3, 0.2), 150); }
            else if (type === 'clear') { playTone(523.25, 'square', 0.15); setTimeout(() => playTone(523.25, 'square', 0.15), 150); setTimeout(() => playTone(523.25, 'square', 0.15), 300); setTimeout(() => playTone(783.99, 'square', 0.4), 450); }
        }

        const allQuestions = {
            stage1: [
                { q: "高萩市（たかはぎし）は、茨城県のどのあたりにありますか？", c: ["北（きた）のほう", "南（みなみ）のほう", "まん中"], a: "北（きた）のほう", exp: "高萩市は茨城県の北のほう（県北地域）にあるよ。地図で確認してみよう！" },
                { q: "高萩市の【東がわ】にあるのは、つぎのうちどれですか？", c: ["海（太平洋）", "高い山", "東京都"], a: "海（太平洋）", exp: "東側にはきれいな海（太平洋）が広がっているね。海水浴場もあるよ。" },
                { q: "高萩市の西がわは、どんな土地が多いですか？", c: ["山や森林", "海", "大きなビル"], a: "山や森林", exp: "西の方には山が広がっていて、緑がとても豊かなんだ。" },
                { q: "東・西・南・北の４つに、ななめの方位をくわえたものを何という？", c: ["八方位（はちほうい）", "六方位", "全方位"], a: "八方位（はちほうい）", exp: "東西南北の間に「北東・北西・南東・南西」を入れると、もっとくわしく場所を伝えられるね。" }
            ],
            stage2: [
                { q: "高萩市で、工場がたくさんあるのはどのあたりですか？", c: ["高速道路の近く", "海のすぐそば", "山のてっぺん"], a: "高速道路の近く", exp: "工場で作ったものを積んだ大きなトラックが、すぐに高速道路に乗って運べるから便利なんだ！" },
                { q: "高萩市を南北（たて）に走っている、大きな道路はどれですか？", c: ["国道６号（ろくごう）", "国道１号", "国道５０号"], a: "国道６号（ろくごう）", exp: "国道6号は、海沿いのまちをつなぐとても大切な大きな道だよ。" },
                { q: "【ある市のお話】駅のまわりなど、家やお店が多くて人があつまるのはどんな所？", c: ["にぎやかな所", "緑の多い所", "田や畑の多い所"], a: "にぎやかな所", exp: "電車やバスに乗る人がたくさん集まるから、お店や家が多く建てられているんだね。" },
                { q: "【ある市のお話】山が多くて高い土地で、林が広がっているのはどんな所？", c: ["緑の多い所", "にぎやかな所", "工場の多い所"], a: "緑の多い所", exp: "自然のままの山や林が残っていて、動物や虫がたくさん住んでいるよ。" },
                { q: "【ある市のお話】平らな土地で、田んぼや畑が広がっているのはどんな所？", c: ["田や畑の多い所", "にぎやかな所", "工場の多い所"], a: "田や畑の多い所", exp: "平らで水が使いやすい場所は、お米や野菜を育てるのにピッタリなんだ。" }
            ],
            stage3: [
                { q: "市役所や図書館など、みんなが利用できるしせつを何という？", c: ["公共（こうきょう）しせつ", "秘密のしせつ", "お店"], a: "公共（こうきょう）しせつ", exp: "まちに住むみんなが便利に生活したり、勉強したりするために作られた大切な場所だよ。" },
                { q: "古いお寺や神社、石碑（せきひ）などを見ると、どんなことがわかりますか？", c: ["市の昔のようす", "あしたの天気", "スーパーのねだん"], a: "市の昔のようす", exp: "昔の人がどうやって暮らしていたか、どんな災害があったかなど、大切な歴史がわかるよ。" },
                { q: "【ある市のお話】公共しせつは、市のどんな場所に多いですか？", c: ["人が多く住んでいる所", "人がだれもいない所", "山のおく"], a: "人が多く住んでいる所", exp: "みんなが使いやすいように、人がたくさん集まる便利な場所に作られていることが多いよ。" }
            ],
            boss: { 
                q: "市の「土地の使われ方」について調べてみて、わかったことはどれかな？", 
                c: ["場所の特ちょう（海、山、駅など）に合わせて、色々な使われ方をしている", "どこに行っても、ぜんぶ同じように使われている", "だれも理由を考えずに、てきとうに家を建てている"], 
                a: "場所の特ちょう（海、山、駅など）に合わせて、色々な使われ方をしている", 
                exp: "大正解！交通が便利な場所、自然が多い場所など、それぞれの場所の良さを生かしてまちができているんだね！" 
            }
        };

        let currentQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0, combo = 0, maxCombo = 0;

        function shuffleArray(array) { const newArray = [...array]; for (let i = newArray.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [newArray[i], newArray[j]] = [newArray[j], newArray[i]]; } return newArray; }

        function initGame() {
            const s1 = shuffleArray(allQuestions.stage1).slice(0, 3);
            const s2 = shuffleArray(allQuestions.stage2).slice(0, 4);
            const s3 = shuffleArray(allQuestions.stage3).slice(0, 2);
            
            currentQuestions = [...s1, ...s2, ...s3, allQuestions.boss];
            currentQuestionIndex = 0; score = 0; combo = 0; maxCombo = 0;

            document.getElementById('result-area').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            document.getElementById('combo-display').textContent = "";
            
            updateProgress();
            showQuestion();
        }

        function showQuestion() {
            document.getElementById('explanation-area').style.display = 'none';
            const qData = currentQuestions[currentQuestionIndex];
            const choicesArea = document.getElementById('choices-area');
            const stageInfo = document.getElementById('stage-info');
            const questionText = document.getElementById('question-text');
            
            if(currentQuestionIndex < 3) stageInfo.textContent = "🗺️ ステージ1：高萩市の位置とまわり";
            else if(currentQuestionIndex < 7) stageInfo.textContent = "🛣️ ステージ2：八方位と土地のようす";
            else if(currentQuestionIndex < 9) stageInfo.textContent = "🏫 ステージ3：交通とみんなのしせつ";
            else stageInfo.textContent = "👹 さいごの試練：市のひみつボス！";

            if (qData.q.includes("【ある市のお話】")) {
                const cleanText = qData.q.replace("【ある市のお話】", "");
                questionText.innerHTML = `<span class="general-note">※高萩市ではなく、一般的な「ある市」のお話です</span>第 ${currentQuestionIndex + 1} 問： ${cleanText}`;
            } else {
                questionText.textContent = `第 ${currentQuestionIndex + 1} 問： ${qData.q}`;
            }
            
            choicesArea.innerHTML = '';
            const shuffledChoices = shuffleArray(qData.c);

            shuffledChoices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = choice;
                btn.onclick = () => checkAnswer(choice, qData.a, qData.exp, btn);
                choicesArea.appendChild(btn);
            });
        }

        function checkAnswer(selected, correct, expText, btn) {
            const buttons = document.querySelectorAll('.choice-btn');
            buttons.forEach(b => b.disabled = true);

            if (selected === correct) {
                playSound('correct');
                btn.style.backgroundColor = '#81c784';
                btn.innerHTML = "⭕ せいかい！<br>" + btn.textContent;
                score++; combo++;
                if(combo > maxCombo) maxCombo = combo;
                if(combo > 1) document.getElementById('combo-display').textContent = `${combo} 連続正解中！🔥`;
            } else {
                playSound('incorrect');
                btn.style.backgroundColor = '#e57373';
                btn.innerHTML = "❌ ざんねん！<br>" + btn.textContent;
                combo = 0; document.getElementById('combo-display').textContent = "";
                buttons.forEach(b => {
                    if(b.textContent === correct) {
                        b.style.backgroundColor = '#81c784';
                        b.innerHTML = "⭕ こっちが正解！<br>" + b.textContent;
                    }
                });
            }
            document.getElementById('explanation-text').textContent = expText;
            document.getElementById('explanation-area').style.display = 'block';
        }

        function nextQuestion() {
            currentQuestionIndex++;
            updateProgress();
            if (currentQuestionIndex < currentQuestions.length) { showQuestion(); } else { showResult(); }
        }

        function updateProgress() {
            const percentage = (currentQuestionIndex / 10) * 100;
            document.getElementById('progress-bar').style.width = percentage + '%';
            document.getElementById('player-icon').style.left = percentage + '%';
        }

        function showResult() {
            playSound('clear');
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';
            document.getElementById('score').textContent = score;
            document.getElementById('max-combo').textContent = maxCombo;

            let rank = "";
            if (score === 10) rank = "👑 すばらしい！きみは「高萩はかせ」だ！";
            else if (score >= 8) rank = "🎖️ すごい！「ベテランちょうさ隊長」だ！";
            else if (score >= 5) rank = "🚌 よくがんばった！「一人前ちょうさ隊員」だ！";
            else rank = "🐣 まだまだこれから！「みならい隊員」だ！";
            document.getElementById('rank-text').textContent = rank;
        }

        window.onload = initGame;
    </script>
</body>
</html>
