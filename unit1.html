<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>① わたしたちのまち - たんけんクエスト</title>
    <style>
        body { font-family: 'Hiragino Maru Gothic ProN', 'Meiryo', sans-serif; background-color: #f0f8ff; color: #333; text-align: center; margin: 0; padding: 20px; }
        h1 { color: #2e8b57; margin-bottom: 5px; }
        .game-container { background-color: white; max-width: 600px; margin: 0 auto; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 4px solid #3cb371; }
        
        .status-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-weight: bold; }
        .combo-text { color: #e91e63; font-size: 1.2em; animation: bounce 0.3s ease; }
        @keyframes bounce { 0% {transform: scale(1);} 50% {transform: scale(1.2);} 100% {transform: scale(1);} }

        .progress-container { width: 100%; background-color: #ddd; border-radius: 10px; margin-bottom: 20px; height: 30px; position: relative; }
        .progress-bar { height: 100%; background-color: #3cb371; border-radius: 10px; width: 0%; transition: width 0.5s ease; }
        .player-icon { position: absolute; top: -10px; left: 0%; font-size: 30px; transition: left 0.5s ease; transform: translateX(-50%); }
        .goal-icon { position: absolute; top: 0; right: 5px; font-size: 20px; }
        
        .question-text { font-size: 1.3em; margin-bottom: 20px; font-weight: bold; min-height: 2em; line-height: 1.4; }
        .question-image { max-width: 100%; height: auto; max-height: 150px; margin-bottom: 20px; border: 2px solid #ddd; border-radius: 10px; display: none; }
        
        .choices { display: flex; flex-direction: column; gap: 10px; }
        .choice-btn { background-color: #e8f5e9; border: 2px solid #81c784; border-radius: 10px; padding: 15px; font-size: 1.1em; cursor: pointer; transition: all 0.2s; }
        .choice-btn:hover { background-color: #c8e6c9; transform: translateY(-2px); }
        .choice-btn:disabled { cursor: not-allowed; opacity: 0.8; }

        #explanation-area { display: none; margin-top: 20px; padding: 15px; background-color: #e8f5e9; border: 2px dashed #4caf50; border-radius: 10px; text-align: left; font-size: 1.1em; color: #1b5e20; }
        .next-btn { margin-top: 15px; padding: 15px 30px; background-color: #4caf50; color: white; border: none; border-radius: 30px; font-size: 1.2em; font-weight: bold; cursor: pointer; width: 100%; box-shadow: 0 4px 0 #2e7d32; }
        .next-btn:active { transform: translateY(4px); box-shadow: none; }

        #result-area { display: none; }
        .result-title { font-size: 2em; color: #ff9800; margin-bottom: 10px; }
        .reflection-box { background-color: #fff9c4; border: 2px solid #fbc02d; border-radius: 10px; padding: 15px; margin: 20px 0; text-align: left; }
        .back-btn { display: inline-block; margin-top: 20px; padding: 10px 20px; background-color: #ff9800; color: white; text-decoration: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🗺️ わたしたちのまち クエスト！</h1>
    <p style="margin-top:0;">地図記号や方位をおぼえて、まちのひみつを見つけよう！</p>

    <div class="game-container" id="game-area">
        <div class="status-bar">
            <span id="stage-info" style="color: #666;"></span>
            <span id="combo-display" class="combo-text"></span>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
            <div class="player-icon" id="player-icon">🚶</div>
            <div class="goal-icon">🏫</div>
        </div>

        <div class="question-text" id="question-text">ロード中...</div>
        <img id="question-image" class="question-image" src="" alt="問題の画像">
        
        <div class="choices" id="choices-area"></div>

        <div id="explanation-area">
            <div style="font-weight:bold; margin-bottom:5px;">💡 はっけんメモ（なぜかな？）</div>
            <div id="explanation-text"></div>
            <button class="next-btn" onclick="nextQuestion()">次のたんけんへ ➡️</button>
        </div>
    </div>

    <div class="game-container" id="result-area">
        <div class="result-title">たんけん しゅうりょう！</div>
        <p style="font-size: 1.5em;">せいかい：<span id="score"></span> / 10</p>
        <p style="font-size: 1.2em; color: #e91e63; font-weight: bold;">最大連続正解：<span id="max-combo"></span> コンボ！</p>
        <div id="rank-text" style="font-size: 1.3em; font-weight: bold; margin: 10px 0;"></div>
        
        <div class="reflection-box">
            <h3 style="margin-top:0; color: #f57f17;">📝 ノートにふり返りを書こう！</h3>
            <p>きみが一番<b>「おもしろい！」「なるほど！」</b>と思った地図記号や、まちのひみつは何だったかな？<br>理由と一緒に、ノートにまとめてみよう。</p>
        </div>

        <button class="choice-btn" style="width:100%; margin-bottom:10px;" onclick="initGame()">もういちど たんけんする</button>
        <a href="index.html" class="back-btn" style="width:90%;">🏠 ポータルにもどる</a>
    </div>

    <script>
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function playTone(freq, type, duration, vol=0.1) {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = type;
            oscillator.frequency.value = freq;
            gainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + duration);
        }
        function playSound(type) {
            if (type === 'correct') { playTone(523.25, 'sine', 0.1); setTimeout(() => playTone(659.25, 'sine', 0.2), 100); }
            else if (type === 'incorrect') { playTone(250, 'sawtooth', 0.2, 0.2); setTimeout(() => playTone(200, 'sawtooth', 0.3, 0.2), 150); }
            else if (type === 'clear') { playTone(523.25, 'square', 0.15); setTimeout(() => playTone(523.25, 'square', 0.15), 150); setTimeout(() => playTone(523.25, 'square', 0.15), 300); setTimeout(() => playTone(783.99, 'square', 0.4), 450); }
        }

        const allQuestions = {
            stage1: [
                { q: "太陽がのぼる方角は、どこですか？", c: ["東（ひがし）", "西（にし）", "南（みなみ）", "北（きた）"], a: "東（ひがし）", exp: "朝、太陽は東からのぼって、夕方に西へしずむんだね。これを覚えておくと方位がわかるよ！" },
                { q: "地図をみるとき、ふつうは「上」がどの方角になるように作られていますか？", c: ["北（きた）", "南（みなみ）", "東（ひがし）", "西（にし）"], a: "北（きた）", exp: "地図はいつも「北」が上になるように作られているよ。方位記号の「４」みたいなマークも上を指しているね。" },
                { q: "まちの様子を調べるとき、高いところから見るとどうなりますか？", c: ["遠くまでよく見える", "何も見えなくなる", "声がよく聞こえる"], a: "遠くまでよく見える", exp: "高いところから見ると、まち全体の広がりや、どこに何があるかが一目でわかるね！" }
            ],
            stage2: [
                { q: "「文」という形の地図記号は、何を表していますか？", c: ["学校", "図書館", "交番"], a: "学校", exp: "昔、学校で字（文）を習ったことから「文」という形になったんだよ。" },
                { q: "「交番（こうばん）」を表す地図記号は、どんな形ですか？", c: ["✕（ばつ）の形", "＋（プラス）の形", "〒の形"], a: "✕（ばつ）の形", exp: "交番でおまわりさんが持っている警棒（けいぼう）を交差させた形からきているんだ。" },
                { q: "消防署（しょうぼうしょ）を表す地図記号は、何の形からできていますか？", c: ["さすまた（昔の道具）の形", "ホースの形", "消防車の形"], a: "さすまた（昔の道具）の形", exp: "昔、火事のときに家をこわして火を消すために使っていた「さすまた」という道具の形だよ。" },
                { q: "市役所や区役所を表す地図記号はどれですか？", c: ["◎（二重丸）", "〒の形", "十（漢字のじゅう）"], a: "◎（二重丸）", exp: "まちの中心になる大切な場所だから、◎（二重丸）で地図の中でも目立つようになっているんだ。" },
                { q: "「〒」の形の地図記号は、何を表していますか？", c: ["郵便局（ゆうびんきょく）", "病院", "神社"], a: "郵便局（ゆうびんきょく）", exp: "郵便をあつかっていた「ていしんしょう（逓信省）」という昔の役所の「テ」というカタカナからきているよ。" },
                { q: "「十」の形の地図記号は、何を表していますか？", c: ["病院", "お寺", "交番"], a: "病院", exp: "病院や救急箱、救急車などでよく見る「十字」の形からきているよ。" }
            ],
            stage3: [
                { q: "まちの様子を地図にまとめるとき、便利なものは何ですか？", c: ["地図記号", "温度計", "ストップウォッチ"], a: "地図記号", exp: "文字で「がっこう」と書くよりも、記号を使ったほうが地図がすっきりして見やすくなるね！" },
                { q: "地図の中で、田んぼや畑が多いところには、どんなものがよくありますか？", c: ["ため池や用水路", "大きなビル", "たくさんの電車"], a: "ため池や用水路", exp: "作物（お米や野菜）を育てるためには、たくさんのお水が必要だからだね。" }
            ],
            boss: { 
                q: "みんなにわかりやすい「まちの地図」を作るとき、いちばん大切なことは何かな？", 
                c: ["方位や地図記号を使って、だれが見ても正しくわかるようにかく", "自分の好きな絵だけを、好きなようにかく", "字をできるだけ小さくかいて、たくさん詰めこむ"], 
                a: "方位や地図記号を使って、だれが見ても正しくわかるようにかく", 
                exp: "すばらしい！地図は自分だけじゃなく、他の人が見ても「まちの様子」が正しく伝わることが一番大切なんだね！" 
            }
        };

        let currentQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0, combo = 0, maxCombo = 0;

        function shuffleArray(array) { const newArray = [...array]; for (let i = newArray.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [newArray[i], newArray[j]] = [newArray[j], newArray[i]]; } return newArray; }

        function initGame() {
            const s1 = shuffleArray(allQuestions.stage1).slice(0, 3);
            const s2 = shuffleArray(allQuestions.stage2).slice(0, 4);
            const s3 = shuffleArray(allQuestions.stage3).slice(0, 2);
            
            currentQuestions = [...s1, ...s2, ...s3, allQuestions.boss];
            currentQuestionIndex = 0; score = 0; combo = 0; maxCombo = 0;

            document.getElementById('result-area').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            document.getElementById('combo-display').textContent = "";
            
            updateProgress();
            showQuestion();
        }

        function showQuestion() {
            document.getElementById('explanation-area').style.display = 'none';
            const qData = currentQuestions[currentQuestionIndex];
            const choicesArea = document.getElementById('choices-area');
            const stageInfo = document.getElementById('stage-info');
            
            if(currentQuestionIndex < 3) stageInfo.textContent = "🧭 ステージ1：方位のひみつ";
            else if(currentQuestionIndex < 7) stageInfo.textContent = "🗺️ ステージ2：地図記号のひみつ";
            else if(currentQuestionIndex < 9) stageInfo.textContent = "🏡 ステージ3：まちの様子";
            else stageInfo.textContent = "👑 さいごの試練：たんけん隊長へ";

            document.getElementById('question-text').textContent = `第 ${currentQuestionIndex + 1} 問： ${qData.q}`;
            
            choicesArea.innerHTML = '';
            const shuffledChoices = shuffleArray(qData.c);

            shuffledChoices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = choice;
                btn.onclick = () => checkAnswer(choice, qData.a, qData.exp, btn);
                choicesArea.appendChild(btn);
            });
        }

        function checkAnswer(selected, correct, expText, btn) {
            const buttons = document.querySelectorAll('.choice-btn');
            buttons.forEach(b => b.disabled = true);

            if (selected === correct) {
                playSound('correct');
                btn.style.backgroundColor = '#81c784';
                btn.innerHTML = "⭕ せいかい！<br>" + btn.textContent;
                score++; combo++;
                if(combo > maxCombo) maxCombo = combo;
                if(combo > 1) document.getElementById('combo-display').textContent = `${combo} 連続正解中！🔥`;
            } else {
                playSound('incorrect');
                btn.style.backgroundColor = '#e57373';
                btn.innerHTML = "❌ ざんねん！<br>" + btn.textContent;
                combo = 0; document.getElementById('combo-display').textContent = "";
                buttons.forEach(b => {
                    if(b.textContent === correct) {
                        b.style.backgroundColor = '#81c784';
                        b.innerHTML = "⭕ こっちが正解！<br>" + b.textContent;
                    }
                });
            }
            document.getElementById('explanation-text').textContent = expText;
            document.getElementById('explanation-area').style.display = 'block';
        }

        function nextQuestion() {
            currentQuestionIndex++;
            updateProgress();
            if (currentQuestionIndex < currentQuestions.length) { showQuestion(); } else { showResult(); }
        }

        function updateProgress() {
            const percentage = (currentQuestionIndex / 10) * 100;
            document.getElementById('progress-bar').style.width = percentage + '%';
            document.getElementById('player-icon').style.left = percentage + '%';
        }

        function showResult() {
            playSound('clear');
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';
            document.getElementById('score').textContent = score;
            document.getElementById('max-combo').textContent = maxCombo;

            let rank = "";
            if (score === 10) rank = "👑 すばらしい！きみは「まちたんけん名人」だ！";
            else if (score >= 8) rank = "🎖️ すごい！「ベテランたんけん隊長」だ！";
            else if (score >= 5) rank = "🚶 よくがんばった！「一人前たんけん隊員」だ！";
            else rank = "🐣 まだまだこれから！「みならい隊員」だ！";
            document.getElementById('rank-text').textContent = rank;
        }

        window.onload = initGame;
    </script>
</body>
</html>
